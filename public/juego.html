<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Arcade - Juego</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- ================= HEADER ================= -->
<header class="header">
  <img src="imagenes/logo-arcadeL.png" class="logo">
  <div id="usuario-info"></div>
  <!-- Botón volver al inicio -->
  <a href="index.html" class="btn-volver">🏠 Inicio</a>
</header>
<!-- ================= MAIN ================= -->
<main>

  <!-- CONTENEDOR DOS COLUMNAS-->
  <div class="juego-container">

    <!-- IZQUIERDA -->
    <div class="juego-info">

      <!-- Nombre del juego -->
      <h2 id="nombre-juego"></h2>

      <!-- Descripción del juego -->
      <p id="descripcion-juego" class="descripcion-juego"></p>

      <!-- Ranking de puntuaciones -->
      <h3>🏆 Top 10 Puntuaciones</h3>
      <ul id="ranking"></ul>

      <!-- Formulario para añadir puntuación -->
      <h3>➕ Añadir puntuación</h3>
      <form id="form-puntuacion">
        <label>Puntos</label>
        <input type="number" id="puntos" required>
        <br><br>
        <button type="submit">Guardar puntuación</button>
      </form>

      <!-- Mensaje si no hay sesión -->
      <div id="mensaje-login" style="color:red;">
        Debes <a href="login.html">iniciar sesión</a> para añadir puntuaciones
      </div>

    </div>

    <!-- DERECHA -->
    <div class="juego-imagen-container">
      <img id="imagen-juego" src="" alt="Carátula del juego">
    </div>

  </div>

</main>
<!-- ================= FOOTER ================= -->
<footer class="footer">

  <div class="footer-contenido">

    <p>🎮 Arcade Plataforma</p>

    <p>
      Proyecto web desarrollado con Node.js, Express y MySQL
    </p>

    <p class="footer-links">
      <a href="index.html">Inicio</a> |
      <a href="cuenta.html">Mi cuenta</a>
    </p>

    <p class="footer-copy">
      © 2026 Arcade -Plataforma web de gestion y ranking de juegos Arcade
    </p>

  </div>
</footer>

<script src="juego.js"></script>

</body>
</html>
