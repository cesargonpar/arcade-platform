<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Arcade - Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- ================= HEADER ================= -->
<header class="header">
   <img src = "imagenes\logo-arcadeL.png" class = "logo">
  <a href="index.html" class="volver-btn">🏠 Volver a juegos</a>
</header>
<!-- ================= MAIN ================= -->
<main class="login-main"> <!-- Contenedor principal centrado -->

  <div class="login-container"> <!-- Caja del login -->

    <h2>🎮 Iniciar sesión</h2>

    <form id="form-login">

      <!-- INPUT USUARIO -->
      <div class="input-group">
        <input type="text" id="nombre" required>
        <label>Nombre de usuario</label> <!-- Label animado -->
      </div>

      <!-- INPUT CONTRASEÑA -->
      <div class="input-group">
        <input type="password" id="password" required>
        <label>Contraseña</label> <!-- Label animado -->
      </div>

      <!-- BOTÓN LOGIN -->
      <button type="submit" class="btn-login">Entrar</button>

    </form>

    <!-- LINK A REGISTRO -->
    <p class="registro-link">
      ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
    </p>

    <!-- MENSAJE DE ERROR -->
    <div id="mensaje-error" class="error-msg"></div>

  </div>

</main>
<!-- ================= FOOTER ================= -->
<footer class="footer">

  <div class="footer-contenido">

    <p>🎮 Arcade Plataforma</p>

    <p>
      Proyecto web desarrollado con Node.js, Express y MySQL
    </p>

    <p class="footer-links">
      <a href="index.html">Inicio</a> |
      <a href="cuenta.html">Mi cuenta</a>
    </p>

    <p class="footer-copy">
      © 2026 Arcade -Plataforma web de gestion y ranking de juegos Arcade
    </p>

  </div>
</footer>

<script src="login.js"></script>
</body>
</html>
