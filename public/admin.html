<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>🎮 Panel Admin - Arcade</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
  <img src="imagenes/logo-arcadeL.png" class="logo">
  <input type="text" placeholder="Buscar juego..." id="buscadorAdmin">
  <a href="cuenta.html" id="btn-cuenta" class="cuenta-btn">👤 Mi cuenta</a>
</header>

<!-- ================= MAIN ================= -->
<main>

<h2>Panel Admin - Crear / Gestionar Juegos</h2>

<div class="admin-panel">

  <!-- FORMULARIO CREAR JUEGO -->
  <form id="formJuego">
    <input type="hidden" id="juegoId">
    <input type="text" id="nombre" placeholder="Nombre del juego" required>
    <input type="text" id="genero" placeholder="Género">
    <input type="number" id="anio" placeholder="Año">
    <textarea id="descripcion" placeholder="Descripción"></textarea>
    <input type="text" id="imagen" placeholder="URL de la imagen">
    <button type="submit" id="btnCrear">Crear Juego</button>
    <button type="button" id="btnCancelar" style="display:none;">Cancelar Edición</button>
  </form>

  <p id="mensaje"></p>

  <!-- LISTA DE JUEGOS EXISTENTES -->
  <h3>Juegos existentes</h3>
  <div id="listaJuegosAdmin" class="juegos-grid"></div>

</div>

</main>

<script src="admin.js"></script>

<!-- ================= FOOTER ================= -->
<footer class="footer">
  <div class="footer-contenido">
    <p>🎮 Arcade Plataforma</p>
    <p>Proyecto web desarrollado con Node.js, Express y MySQL</p>
    <p class="footer-links">
      <a href="index.html">Inicio</a> |
      <a href="cuenta.html">Mi cuenta</a>
    </p>
    <p class="footer-copy">
      © 2026 Arcade - Plataforma web de gestión y ranking de juegos Arcade
    </p>
  </div>
</footer>
</body>
</html>
