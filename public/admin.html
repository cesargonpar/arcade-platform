<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>🎮 Panel Admin - Arcade  </title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
  <img src="imagenes/logo-arcadeL.png" class="logo">
  <input type="text" placeholder="Buscar juego..." id="buscadorAdmin">
  <button id="btnBuscar">🔍</button>
  <a href="cuenta.html" id="btn-cuenta" class="cuenta-btn">👤 Mi cuenta</a>
</header>

<!-- ================= MAIN ================= -->
<main>

<h2>Panel Admin - Crear / Gestionar Juegos</h2>

<div class="admin-panel">

 <!-- ================= FORMULARIO CREAR / EDITAR JUEGO ================= -->
<div class="admin-form-container">

  <h3 id="titulo-form">➕ Crear nuevo juego</h3>

  <form id="formJuego" class="admin-form">

    <!-- ID oculto (para edición) -->
    <input type="hidden" id="juegoId">

    <!-- Nombre -->
    <label for="nombre">Nombre del juego</label>
    <input type="text" id="nombre" placeholder="Ej: Pac-Man" required>

    <!-- Género -->
    <label for="genero">Género</label>
    <input type="text" id="genero" placeholder="Ej: Arcade, Acción">

    <!-- Año -->
    <label for="anio">Año</label>
    <input type="number" id="anio" placeholder="Ej: 1980">

    <!-- Descripción -->
    <label for="descripcion">Descripción</label>
    <textarea id="descripcion" placeholder="Describe el juego..."></textarea>

    <!-- Imagen -->
    <label for="imagen">URL de la imagen</label>
    <input type="text" id="imagen" placeholder="imagenes/pacman.jpg...">

    <!-- Botones -->
    <div class="admin-botones">
      <button type="submit" id="btnCrear">Crear Juego</button>
      <button type="button" id="btnCancelar" style="display:none;">
        Cancelar
      </button>
    </div>

  </form>

  <!-- Mensaje de estado -->
  <p id="mensaje" class="mensaje-admin"></p>

</div>

  <!-- LISTA DE JUEGOS EXISTENTES -->
  <h3>Juegos existentes</h3>
  <div id="listaJuegosAdmin" class="juegos-grid"></div>

</div>

</main>

<script src="admin.js"></script>

<!-- ================= FOOTER ================= -->
<footer class="footer">
  <div class="footer-contenido">
    <p>🎮 Arcade Plataforma</p>
    <p>Proyecto web desarrollado con Node.js, Express y MySQL</p>
    <p class="footer-links">
      <a href="index.html">Inicio</a> |
      <a href="cuenta.html">Mi cuenta</a>
    </p>
    <p class="footer-copy">
      © 2026 Arcade - Plataforma web de gestión y ranking de juegos Arcade
    </p>
  </div>
</footer>
</body>
</html>
